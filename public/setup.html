<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonitus Portal — Configuración Inicial</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f4f6; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .box {
      background: #fff; border-radius: 16px; padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1); max-width: 420px; width: 100%;
    }
    h1 { font-size: 1.25rem; font-weight: 700; color: #111827; margin-bottom: 6px; }
    p  { font-size: .875rem; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
    .alert {
      padding: 12px 14px; border-radius: 10px; font-size: .875rem;
      margin-bottom: 20px; font-weight: 500;
    }
    .alert-ok  { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .alert-err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer;
      font-size: .9375rem; font-weight: 600; background: #10b981; color: #fff;
      transition: background .2s;
    }
    .btn:hover { background: #059669; }
    .btn:disabled { background: #a7f3d0; cursor: not-allowed; }
    .back { display:block; text-align:center; margin-top:16px; font-size:.875rem; color:#10b981; text-decoration:none; }
    .back:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="box">
    <h1>⚙️ Configuración Inicial</h1>
    <p>Esta página crea la cuenta del <strong>profesor</strong> en Firebase.<br>
       Ejecútala <strong>una sola vez</strong> después de configurar tu proyecto Firebase.</p>
    <div id="msg"></div>
    <button class="btn" id="setup-btn">Crear cuenta de Profesor</button>
    <a href="index.html" class="back">← Volver al portal</a>
  </div>

  <script type="module">
    import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword }
      from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { firebaseConfig } from './js/firebase-config.js';

    const fbApp = initializeApp(firebaseConfig);
    const auth  = getAuth(fbApp);
    const db    = getFirestore(fbApp);

    const msgEl = document.getElementById('msg');
    const btn   = document.getElementById('setup-btn');

    function showMsg(text, ok = false) {
      msgEl.className = `alert ${ok ? 'alert-ok' : 'alert-err'}`;
      msgEl.textContent = text;
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';
      msgEl.className = '';
      msgEl.textContent = '';

      try {
        const cred = await createUserWithEmailAndPassword(
          auth, 'profesor@sonitus.portal', 'Sonitus2024!'
        );
        await setDoc(doc(db, 'users', cred.user.uid), {
          username: 'profesor',
          fullName: 'Profesor Sonitus',
          role: 'teacher',
          xp: 0, level: 'Maestro', streak: 0,
          createdAt: serverTimestamp(),
          lastActivity: serverTimestamp(),
        });
        showMsg('✅ Cuenta de profesor creada. Usuario: "profesor" · Contraseña: "Sonitus2024!"\n\nYa puedes eliminar o ignorar esta página.', true);
        btn.textContent = '¡Listo!';
      } catch (err) {
        if (err.code === 'auth/email-already-in-use') {
          showMsg('La cuenta del profesor ya existe. No necesitas ejecutar esto de nuevo.', true);
        } else {
          showMsg('Error: ' + err.message);
          btn.disabled = false;
          btn.textContent = 'Crear cuenta de Profesor';
        }
      }
    });
  </script>
</body>
</html>
